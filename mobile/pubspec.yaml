name: npd_fuel
description: NPD Fuel Monitoring and Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.6

  # Local Storage
  shared_preferences: ^2.2.3

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.2.0
  cached_network_image: ^3.3.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # UI
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Location
  geolocator: ^14.0.0
  geocoding: ^4.0.0

  # Utils
  equatable: ^2.0.5
  uuid: ^4.4.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/logo.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/assets/logo.jpeg"

flutter:
  uses-material-design: true

  assets:
    - lib/assets/
